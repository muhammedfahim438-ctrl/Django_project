<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User List</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h2 class="text-primary">All Users</h2>

<a href="{% url 'task_list' %}" class="btn btn-secondary">Back</a>
</div>

<table class="table table-bordered table-hover shadow bg-white">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Mobile</th>
<th>Action</th>
</tr>
</thead>

<tbody>
{% for user in users %}
<tr>
<td>{{ user.id }}</td>
<td>{{ user.username }}</td>
<td>{{ user.email }}</td>
<td>{{ user.userprofile.mobile }}</td>
<td>
<a href="{% url 'edit_user' user.id %}" class="btn btn-warning btn-sm">Edit</a>
<a href="{% url 'delete_user' user.id %}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>

</body>
</html>
